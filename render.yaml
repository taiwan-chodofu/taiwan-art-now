services:
  - type: web
    name: taiwan-art-now
    runtime: python
    buildCommand: apt-get update && apt-get install -y fonts-noto-cjk && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
