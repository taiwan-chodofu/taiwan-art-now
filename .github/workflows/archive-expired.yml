name: Archive expired exhibitions

on:
  schedule:
    # 毎日台湾時間01:00 (UTC 17:00) に実行
    - cron: '0 17 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run archive script
        run: python archive_expired.py || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manual_exhibitions.json archive.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-archive expired exhibitions"
            git push
          fi
